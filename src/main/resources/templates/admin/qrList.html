<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Admin QR</title>
    <link rel="stylesheet" th:href="@{/css/output.css}" />
    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <header class="bg-white shadow">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
          <i data-lucide="qr-code" class="w-5 h-5 text-indigo-600"></i>
          Panel Administración QR
        </h1>
        <form
          method="post"
          th:action="@{/admin/qrs/generate}"
          class="flex gap-2"
        >
          <input
            type="number"
            name="cantidad"
            min="1"
            max="500"
            placeholder="Cantidad"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-28"
          />
          <button
            class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg shadow text-sm flex items-center gap-1"
          >
            <i data-lucide="plus" class="w-4 h-4"></i> Generar
          </button>
        </form>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
      <div class="bg-white shadow-lg rounded-2xl p-6">
        <!-- Barra bulk -->
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <span
              id="selected-count"
              class="text-sm text-gray-500 flex items-center gap-1"
            >
              <i data-lucide="check-square" class="w-4 h-4"></i>
              0 seleccionados
            </span>
            <button
              onclick="selectAvailable()"
              class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg border border-indigo-200 flex items-center gap-1"
            >
              <i data-lucide="badge-check" class="w-3 h-3"></i> Seleccionar
              disponibles
            </button>
            <button
              onclick="clearSelection()"
              class="text-xs bg-gray-50 hover:bg-gray-100 text-gray-600 px-3 py-1 rounded-lg border border-gray-200 flex items-center gap-1"
            >
              <i data-lucide="x" class="w-3 h-3"></i> Limpiar
            </button>
          </div>
          <button
            onclick="downloadSelected()"
            id="btn-download-zip"
            disabled
            class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm px-4 py-2 rounded-lg shadow flex items-center gap-2"
          >
            <i data-lucide="archive" class="w-4 h-4"></i> Descargar ZIP
          </button>
        </div>

        <!-- Tabla -->

        <div class="overflow-x-auto">
          <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-4 py-3">
                  <input
                    type="checkbox"
                    id="check-all"
                    onchange="toggleAll(this)"
                    class="rounded border-gray-300"
                  />
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  ID
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Scans
                </th>
                <th
                  class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase"
                >
                  Status
                </th>
                <th
                  class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase"
                >
                  Acciones
                </th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-100">
              <tr th:each="qr : ${qrs}" class="hover:bg-gray-50 transition">
                <td class="px-4 py-4">
                  <input
                    type="checkbox"
                    name="ids"
                    th:value="${qr.id}"
                    class="qr-checkbox rounded border-gray-300"
                    onchange="updateCount()"
                  />
                </td>
                <td
                  class="px-6 py-4 text-sm font-mono text-gray-700"
                  th:text="${qr.id}"
                ></td>
                <td
                  class="px-6 py-4 text-sm text-gray-600 flex items-center gap-1"
                >
                  <i data-lucide="scan" class="w-3.5 h-3.5 text-gray-400"></i>
                  <span th:text="${qr.scanCount}"></span>
                </td>
                <td class="px-6 py-4">
                  <span
                    th:if="${qr.used}"
                    class="inline-flex items-center gap-1 px-3 py-1 text-xs font-semibold bg-red-100 text-red-700 rounded-full"
                  >
                    <i data-lucide="lock" class="w-3 h-3"></i> Usado
                  </span>
                  <span
                    th:unless="${qr.used}"
                    class="inline-flex items-center gap-1 px-3 py-1 text-xs font-semibold bg-green-100 text-green-700 rounded-full"
                  >
                    <i data-lucide="circle-check" class="w-3 h-3"></i>
                    Disponible
                  </span>
                </td>
                <td class="px-6 py-4 text-right">
                  <div class="flex justify-end gap-2">
                    <a
                      th:href="@{'/admin/qrs/download/' + ${qr.id}}"
                      class="inline-flex items-center gap-1 bg-indigo-500 hover:bg-indigo-600 text-white text-sm px-3 py-1.5 rounded-lg shadow"
                    >
                      <i data-lucide="download" class="w-3.5 h-3.5"></i>
                    </a>
                    <form
                      th:action="@{'/admin/qrs/delete/' + ${qr.id}}"
                      method="post"
                    >
                      <!-- <input
                          type="hidden"
                          th:name="${_csrf.parameterName}"
                          th:value="${_csrf.token}"
                        /> -->

                      <button
                        class="inline-flex items-center gap-1 bg-red-500 hover:bg-red-600 text-white text-sm px-3 py-1.5 rounded-lg shadow"
                      >
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                      </button>
                    </form>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Paginación -->
        <div
          class="flex items-center justify-between mt-6 pt-4 border-t border-gray-100"
        >
          <p class="text-sm text-gray-500">
            Página
            <span class="font-semibold" th:text="${currentPage + 1}"></span> de
            <span class="font-semibold" th:text="${totalPages}"></span> &mdash;
            <span th:text="${totalElements}"></span> QRs totales
          </p>
          <div class="flex items-center gap-1">
            <!-- Anterior -->
            <a
              th:if="${currentPage > 0}"
              th:href="@{/admin/qrs(page=${currentPage - 1})}"
              class="inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-600"
            >
              <i data-lucide="chevron-left" class="w-4 h-4"></i> Anterior
            </a>
            <span
              th:unless="${currentPage > 0}"
              class="inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg border border-gray-100 text-gray-300 cursor-not-allowed"
            >
              <i data-lucide="chevron-left" class="w-4 h-4"></i> Anterior
            </span>

            <!-- Páginas numeradas -->
            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
              <a
                th:if="${i != currentPage}"
                th:href="@{/admin/qrs(page=${i})}"
                th:text="${i + 1}"
                class="px-3 py-1.5 text-sm rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-600"
              >
              </a>
              <span
                th:if="${i == currentPage}"
                th:text="${i + 1}"
                class="px-3 py-1.5 text-sm rounded-lg bg-indigo-600 text-white font-semibold"
              >
              </span>
            </th:block>

            <!-- Siguiente -->
            <a
              th:if="${currentPage + 1 < totalPages}"
              th:href="@{/admin/qrs(page=${currentPage + 1})}"
              class="inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg border border-gray-200 hover:bg-gray-50 text-gray-600"
            >
              Siguiente <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </a>
            <span
              th:unless="${currentPage + 1 < totalPages}"
              class="inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg border border-gray-100 text-gray-300 cursor-not-allowed"
            >
              Siguiente <i data-lucide="chevron-right" class="w-4 h-4"></i>
            </span>
          </div>
        </div>
      </div>
    </main>

    <script>
      lucide.createIcons();

      function toggleAll(master) {
        document
          .querySelectorAll(".qr-checkbox")
          .forEach((cb) => (cb.checked = master.checked));
        updateCount();
      }

      function updateCount() {
        const checked = document.querySelectorAll(
          ".qr-checkbox:checked",
        ).length;
        document.getElementById("selected-count").innerHTML =
          `<i data-lucide="check-square" class="w-4 h-4 inline"></i> ${checked} seleccionados`;
        lucide.createIcons();
        document.getElementById("btn-download-zip").disabled = checked === 0;
      }

      function selectAvailable() {
        document.querySelectorAll(".qr-checkbox").forEach((cb) => {
          const row = cb.closest("tr");
          cb.checked = row.querySelector(".bg-red-100") === null;
        });
        updateCount();
      }

      function clearSelection() {
        document
          .querySelectorAll(".qr-checkbox")
          .forEach((cb) => (cb.checked = false));
        document.getElementById("check-all").checked = false;
        updateCount();
      }

      function downloadSelected() {
        const selectedIds = Array.from(
          document.querySelectorAll(".qr-checkbox:checked"),
        ).map((cb) => cb.value);

        if (selectedIds.length === 0) return;

        const form = document.createElement("form");
        form.method = "POST";
        form.action = "/admin/qrs/download-zip";

        selectedIds.forEach((id) => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = "ids";
          input.value = id;
          form.appendChild(input);
        });

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
      }
    </script>
  </body>
</html>
