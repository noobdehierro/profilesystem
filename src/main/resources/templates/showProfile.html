<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Perfil médico</title>

    <link rel="stylesheet" href="/css/output.css" />
  </head>

  <body
    class="bg-gradient-to-br from-gray-950 via-gray-900 to-black min-h-screen flex items-center justify-center px-4 text-white"
  >
    <div class="max-w-3xl w-full">
      <!-- HEADER CARD -->
      <div
        class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-3xl shadow-2xl p-8 text-center relative"
      >
        <div class="absolute inset-0 bg-black opacity-10 rounded-3xl"></div>

        <div class="relative">
          <div
            class="w-28 h-28 mx-auto rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-4xl font-bold mb-4 border border-white/30 shadow-lg"
          >
            <span
              th:text="${profile.name != null ? #strings.substring(profile.name,0,1) : '?'}"
            ></span>
          </div>

          <h1
            class="text-3xl font-bold tracking-wide"
            th:text="${profile.name}"
          ></h1>

          <p class="opacity-90 mt-1" th:text="${profile.email}"></p>

          <p class="opacity-80 text-sm" th:text="${profile.phone}"></p>
        </div>
      </div>

      <!-- INFO GRID -->
      <div class="grid md:grid-cols-2 gap-6 mt-6">
        <!-- PERSONAL CARD -->
        <div
          class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg"
        >
          <h2 class="text-indigo-400 font-semibold mb-4 text-lg">
            🧍 Datos personales
          </h2>

          <div class="space-y-2 text-gray-300">
            <p>
              <span class="text-gray-500">Nacimiento:</span>
              <span th:text="${profile.birthDate} ?: 'No registrado'"></span>
            </p>

            <p>
              <span class="text-gray-500">Tipo de sangre:</span>

              <span
                class="bg-red-600 px-2 py-1 rounded text-sm font-semibold ml-2"
                th:text="${profile.bloodType} ?: '--'"
              >
              </span>
            </p>
            <!-- direccion -->
            <p>
              <span class="text-gray-500">Dirección:</span>
              <span th:text="${profile.address} ?: 'No registrado'"></span>
            </p>
          </div>
        </div>

        <!-- EMERGENCY CARD -->
        <div
          class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg"
        >
          <h2 class="text-indigo-400 font-semibold mb-4 text-lg">
            🚨 Contacto emergencia
          </h2>

          <div class="space-y-2 text-gray-300">
            <p th:text="${profile.emergencyContactName} ?: 'No registrado'"></p>

            <p th:text="${profile.emergencyContactPhone} ?: '--'"></p>

            <p
              class="text-gray-500 text-sm"
              th:text="${profile.emergencyContactRelation}"
            ></p>
          </div>
        </div>

        <!-- MEDICAL CARD -->
        <div
          class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg md:col-span-2"
        >
          <h2 class="text-indigo-400 font-semibold mb-4 text-lg">
            🩺 Información médica
          </h2>

          <div class="space-y-3 text-gray-300">
            <p>
              <span class="text-gray-500">Alergias:</span>
              <span
                th:text="${profile.allergies} ?: 'Ninguna registrada'"
              ></span>
            </p>

            <p>
              <span class="text-gray-500">Enfermedades:</span>
              <span
                th:text="${profile.chronicDiseases} ?: 'Ninguna registrada'"
              ></span>
            </p>

            <p>
              <span class="text-gray-500">Medicamentos:</span>
              <span
                th:text="${profile.medications} ?: 'Ninguno registrado'"
              ></span>
            </p>
          </div>
        </div>

        <!-- INSURANCE CARD -->
        <div
          class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg md:col-span-2"
        >
          <h2 class="text-indigo-400 font-semibold mb-4 text-lg">
            🏥 Seguro médico
          </h2>

          <div class="space-y-2 text-gray-300">
            <p th:text="${profile.insuranceProvider} ?: 'No registrado'"></p>

            <p
              class="text-gray-500 text-sm"
              th:text="${profile.insuranceNumber}"
            ></p>
          </div>
        </div>
      </div>

      <!-- EDIT ACCESS CARD -->
      <div
        class="mt-6 bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-lg"
      >
        <form
          method="post"
          th:action="@{/profile/{token}/verify(token=${profile.token})}"
          class="space-y-3"
        >
          <input
            name="password"
            type="password"
            placeholder="Contraseña para editar perfil"
            class="w-full px-4 py-3 rounded-lg bg-gray-800 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />

          <button
            class="w-full bg-indigo-600 hover:bg-indigo-500 transition duration-200 py-3 rounded-lg font-semibold shadow-md"
          >
            Editar perfil
          </button>
        </form>
      </div>
    </div>
  </body>
</html>
